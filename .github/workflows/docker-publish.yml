name: Image Build and Publish

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: quay.io
  IMAGE_NAME: iamgini/ansible-maya

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Build image with Podman
        run: |
          podman build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} .
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Log in to Quay.io
        if: steps.meta.outputs.is_tag == 'true'
        run: |
          echo "${{ secrets.QUAY_PASSWORD }}" | podman login ${{ env.REGISTRY }} \
            -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Push images
        if: steps.meta.outputs.is_tag == 'true'
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

