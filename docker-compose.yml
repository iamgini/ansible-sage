version: '3.8'

services:
  # ============================================================================
  # Ansible Sage - Main Application
  # ============================================================================
  ansible-sage:
    build:
      context: .
      dockerfile: Dockerfile
    image: ansible-sage:latest
    container_name: ansible-sage
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}

      # Database
      - DATABASE_URL=postgresql://sage:sage_password@postgres:5432/ansible_sage

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # AAP Integration
      - AAP_URL=${AAP_URL}
      - AAP_TOKEN=${AAP_TOKEN}
      - AAP_VERIFY_SSL=${AAP_VERIFY_SSL:-true}

      # Service Configuration
      - SAGE_LOG_LEVEL=${SAGE_LOG_LEVEL:-INFO}
      - SAGE_ENABLE_MOLECULE_TESTING=${SAGE_ENABLE_MOLECULE_TESTING:-true}
      - SAGE_AUTO_EXECUTE_THRESHOLD=${SAGE_AUTO_EXECUTE_THRESHOLD:-0.8}

      # Feature Flags
      - FEATURE_AAP_CATALOG_SEARCH=${FEATURE_AAP_CATALOG_SEARCH:-true}
      - FEATURE_MOLECULE_TESTING=${FEATURE_MOLECULE_TESTING:-true}

    volumes:
      - ./generated_playbooks:/app/generated_playbooks
      - ./config:/app/config
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # For Molecule testing

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - sage-network

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ansible-sage-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ansible_sage
      - POSTGRES_USER=sage
      - POSTGRES_PASSWORD=sage_password
      - PGDATA=/var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d ansible_sage"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sage-network

  # ============================================================================
  # Redis Cache & Queue
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ansible-sage-redis
    restart: unless-stopped
    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - sage-network

  # ============================================================================
  # Ollama (Optional - for local LLM)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ansible-sage-ollama
    restart: unless-stopped
    profiles:
      - local-llm  # Only start with: docker-compose --profile local-llm up

    ports:
      - "11434:11434"

    volumes:
      - ollama-models:/root/.ollama

    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    networks:
      - sage-network

  # ============================================================================
  # Prometheus (Optional - for metrics)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ansible-sage-prometheus
    restart: unless-stopped
    profiles:
      - monitoring

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

    networks:
      - sage-network

  # ============================================================================
  # Grafana (Optional - for visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ansible-sage-grafana
    restart: unless-stopped
    profiles:
      - monitoring

    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards

    depends_on:
      - prometheus

    networks:
      - sage-network

# ============================================================================
# Networks
# ============================================================================
networks:
  sage-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ollama-models:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
