version: '3.8'

services:
  # ============================================================================
  # Ansible Maya - Main Application
  # ============================================================================
  # Stateless REST API for AI-powered Ansible playbook generation
  # No database or cache needed - generates playbooks on-demand via LLM
  # ============================================================================
  ansible-maya:
    build:
      context: .
      dockerfile: Dockerfile
    image: ansible-maya:latest
    container_name: ansible-maya
    restart: unless-stopped
    ports:
      - "8000:8000"

    environment:
      # LLM Provider Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}

      # Claude Provider
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # OpenAI Provider
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Custom LLM Provider (OpenAI-compatible endpoints)
      - CUSTOM_LLM_ENDPOINT=${CUSTOM_LLM_ENDPOINT}
      - CUSTOM_LLM_MODEL=${CUSTOM_LLM_MODEL}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}

    volumes:
      - ./generated_playbooks:/app/generated_playbooks
      - ./config:/app/config
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
